AND,((PROTOCOL,UDP),(OR,((DEST-PORT,53), (DEST-PORT,853))),(IP-CIDR,8.8.8.8/32)),REJECT-NO-DROP
AND,((PROTOCOL,UDP),(OR,((DEST-PORT,53), (DEST-PORT,853))),(IP-CIDR,8.8.4.4/32)),REJECT-NO-DROP
AND,((PROTOCOL,UDP),(OR,((DEST-PORT,53), (DEST-PORT,853))),(IP-CIDR,77.88.8.88/32)),REJECT-NO-DROP
