# --------------------------------------------------
# 3. Blocking DNS bypass
# This rule can prevent the leakage of DNS queries,
# which could reveal the websites and apps you visit.
# This rule may cause some issues with some applications.
# --------------------------------------------------
## Simple DNS (port 53)
AND,((DEST-PORT,53),(OR,((PROTOCOL,UDP),(PROTOCOL,TCP)))),REJECT-NO-DROP

## DNS-over-QUIC (DoQ)
AND,((PROTOCOL,UDP),(OR,((DEST-PORT,784),(DEST-PORT,8853)))),REJECT-NO-DROP

## Google DNS
AND,((PROTOCOL,TCP),(DEST-PORT,853),(IP-CIDR,8.8.8.8/32)),REJECT-NO-DROP
AND,((PROTOCOL,TCP),(DEST-PORT,853),(IP-CIDR,8.8.4.4/32)),REJECT-NO-DROP
AND,((PROTOCOL,TCP),(DEST-PORT,853),(DOMAIN,dns.google.com)),REJECT-NO-DROP

# TODO: FIXME: The blocked DNS servers overlap with the dns-server and fallback-dns-server settings in the [General] section, which may cause rule conflicts and result in DNS malfunction. You must optimize the rules to avoid such conflicts.

## Cloudflare DNS
AND,((PROTOCOL,TCP),(DEST-PORT,853),(IP-CIDR,1.1.1.1/32)),REJECT-NO-DROP
AND,((PROTOCOL,TCP),(DEST-PORT,853),(IP-CIDR,1.0.0.1/32)),REJECT-NO-DROP
AND,((PROTOCOL,TCP),(DEST-PORT,853),(IP-CIDR,1.1.1.2/32)),REJECT-NO-DROP
AND,((PROTOCOL,TCP),(DEST-PORT,853),(IP-CIDR,1.0.0.2/32)),REJECT-NO-DROP
AND,((PROTOCOL,TCP),(DEST-PORT,853),(DOMAIN,dns.cloudflare.com)),REJECT-NO-DROP

