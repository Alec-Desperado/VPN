## Block all UDP traffic passing through proxy servers
# AND,((FINAL,PROXY), (PROTOCOL,UDP)),REJECT

## The logical rule for these ANDs is to prevent issues
## that could cause module scripts to fail if a Spotify or
## YouTube related request goes UDP.
# AND,((PROTOCOL,UDP),(DOMAIN-SUFFIX,googlevideo.com)),REJECT
# AND,((PROTOCOL,UDP),(DOMAIN-SUFFIX,youtubei.googleapis.com)),REJECT

# AND,((PROTOCOL,UDP),(DEST-PORT,443),(DOMAIN-SUFFIX,google.com)),REJECT

# AND,((PROTOCOL,UDP),(DOMAIN,spclient.wg.spotify.com)),REJECT

## Explanation for blocking UDP traffic on port 443: HTTP3/QUIC protocols are becoming popular,
## but domestic ISPs and international locations have low UDP priority,
## they don't work well and are blocked to force a return to HTTP2/HTTP1.1.
## (If you need to enable this logical rule, remove the # comment character before AND).
# AND,((OR,((PROTOCOL,UDP), (PROTOCOL,QUIC))),(DST-PORT,443)),REJECT

