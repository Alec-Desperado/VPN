USA_Fallback = fallback, US_Filter, USA_Filter, PROXY, Auto_Select, url=http://cp.cloudflare.com/generate_204, interval=300, timeout=2

AI = fallback, AI_Filter, USA_Filter, Auto_Select, url=http://cp.cloudflare.com/generate_204, interval=300, timeout=2

Google = fallback, US_Filter, USA_Filter, DE_Filter, FI_Filter, Auto_Select, url=https://www.youtube.com/generate_204, interval=300, timeout=2

Telegram = fallback, FI_Filter, DE_Filter, Auto_Select, url=https://t.me/favicon.ico, interval=300, timeout=2

Final = select, All_Proxies, PROXY, policy-select-name=All_Proxies

