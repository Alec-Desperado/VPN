# Selecting the fastest proxy server
[Proxy Group]

# AI-Group: selects the fastest server from those whose description includes the words "AI," "Neuro," or the corresponding emoji:
# AI-Group = url-test, policy-regex-filter=(AI|Нейро|🤖), interval=600, timeout=5, url=http://www.gstatic.com/generate_204
# YouTube Group: Selects the fastest server from those whose description includes the words "YouTube," "Russia," or the corresponding emoji:
# YouTube-Group = url-test, policy-regex-filter=(YouTube|Россия|Russia|🇷🇺|🍿), interval=600, timeout=5, url=http://www.gstatic.com/generate_204
# EU-Group: Choose the fastest European server:
# EU-Group = url-test, policy-regex-filter=(Франция|France|🇫🇷|Испания|Spain|🇪🇸|Германия|Germany|🇩🇪|Польша|Poland|🇵🇱), interval=600, timeout=5, url=http://www.gstatic.com/generate_204
# USA-Group: Choose the fastest US server:
# USA-Group = url-test, policy-regex-filter=(США|USA|🇺🇸), interval=600, timeout=5, url=http://www.gstatic.com/generate_204
# Israel-Group: Choose the fastest Israeli server (local banking and government service websites often have trouble loading from abroad):
# Israel-Group = url-test, policy-regex-filter=(🇮🇱|Израиль|Israel), interval=600, timeout=5, url=http://www.gstatic.com/generate_204

# AUTO: This group will include all servers EXCEPT those whose names contain "YouTube," "Russia," or the Russian flag emoji—please note that the regular expression differs from the groups above
AUTO-test = url-test,url=https://cp.cloudflare.com/generate_204,interval=600,tolerance=100,timeout=5,policy-regex-filter=(?i)^(?!.*(Россия|🇷🇺|Russia|RU-)).*$

US-node = url-test,url=https://cp.cloudflare.com/generate_204,interval=600,tolerance=100,timeout=5,policy-regex-filter=(?i)^(?=.*(🇺🇸|(USA|United States|US|Los Angeles|Seattle|States|American|США|Нью-Йорк|Хьюстон|Майами|Сан-Хосе|Лос-Анжелес|🇩🇪|Франкфурт-на-Майне|Германия))(?!.*(Россия|🇷🇺|Russia|RU-|Hong Kong|Taiwan|Japan|Singapore|South Korea|Lion City|SG|JP|KR|HK|TW))).+$

AUTO = url-test, url=https://cp.cloudflare.com/generate_204, interval=600, tolerance=100, timeout=5, policy-regex-filter=(?i)^(?=.*(🇳🇱|🇳🇴|🇩🇪|🇫🇮|🇺🇸|🇨🇿|🇨🇭|(NL|Амстердам|Нидерланды|Стокгольм|Швеция|Осло|Норвегия|USA|США|Франкфурт-на-Майне|Германия))(?!.*(YouTube|Россия|Москва|🇷🇺|Russia|RU-|Hong Kong|Taiwan|Japan|Singapore|South Korea|Lion City|SG|JP|KR|HK|TW))).+$

TG = fallback,NL,interval=600,timeout=5,url=http://www.gstatic.com/generate_204policy-regex-filter=(?i)^(?=.*(🇺🇸|(NL))(?!.*(Россия|🇷🇺|Russia|RU-))).+$

test = fallback,NL,IT,DE,policy-select-name=NL,interval=600,timeout=5,url=http://www.gstatic.com/generate_204

# How to test groups: Add the "2IP" IP address check service to your routing rules:
# [Rule]
# DOMAIN-SUFFIX,2ip.ua,US-node
# DOMAIN-SUFFIX,2ip.ru,DIRECT
# DOMAIN-SUFFIX,2ip.io,test
# If you visit 2ip.ua, you should see a VPN server address from Europe.
# If you go to 2ip.io, you'll see the address of the fastest server (excluding Russian ones) that Shadowrocket will automatically select.
# If you go to 2ip.ru, you'll see your original IP address (this will establish a direct connection bypassing the VPN).

